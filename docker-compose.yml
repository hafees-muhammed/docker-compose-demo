version: "3.9"

services:

 app:
   build: .
   container_name: node-app

   ports:
     - "3000:3000"

   restart: always

 nginx:
   image: nginx:latest

   container_name: nginx

   ports:
     - "80:80"

   depends_on:
     - app

   volumes:
     - ./nginx/nginx.conf:/etc/nginx/nginx.conf

   restart: always
